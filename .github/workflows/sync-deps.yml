name: Sync dev-deps with dev

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

  schedule:
    - cron: '0 6 * * 0' # Sunday 06:00 UTC

  workflow_dispatch:

jobs:
  sync-deps:
    if: |
      github.event.pull_request.merged == true ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reset deps to dev
        run: |
          git checkout dev-deps
          git reset --hard origin/dev
          git push --force-with-lease origin dev-deps
